name: Daily Scrape + Deploy to Vercel

# Runs every day at 8am ET (noon UTC)
# Also runs on every push to main (for testing), and can be triggered manually
on:
  schedule:
    - cron: '0 12 * * *'
  push:
    branches: [main]
    paths:
      - 'eoir_decisions_scraper.ipynb'
      - 'json_to_sqlite.py'
      - 'metadata.yml'
      - '.github/workflows/scrape.yml'
  workflow_dispatch:

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit updated data files back to the repo

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Python + dependencies ─────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt jupyter nbconvert

      # pdftotext (poppler) — only needed when DOWNLOAD_PDFS=True
      - name: Install poppler-utils (pdftotext)
        run: sudo apt-get install -y poppler-utils

      # ── 3. Run scraper ────────────────────────────────────────────────────
      # Convert notebook → Python script, then execute it directly.
      # This avoids needing a Jupyter kernel and is faster in CI.
      - name: Convert notebook to script
        run: |
          jupyter nbconvert --to script eoir_decisions_scraper.ipynb \
            --output eoir_decisions_scraper --output-dir .
          # nbconvert outputs .txt when notebook lacks kernel language metadata
          [ -f eoir_decisions_scraper.txt ] && mv eoir_decisions_scraper.txt eoir_decisions_scraper.py
          ls -la eoir_decisions_scraper.py

      - name: Run scraper
        run: python3 eoir_decisions_scraper.py

      # ── 4. Commit updated JSON data back to the repo ──────────────────────
      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bia_ag_decisions.json \
                  data/ocaho_decisions.json
          # changelogs and error_logs are optional but useful to track
          git add data/changelogs/ data/error_logs/ 2>/dev/null || true
          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No data changes today — skipping commit."
          else
            git commit -m "auto-scrape: $(date -u '+%Y-%m-%d')"
            git push
          fi

      # ── 5. Build SQLite database ──────────────────────────────────────────
      - name: Build SQLite database
        run: python3 json_to_sqlite.py

      # ── 6. Deploy to Vercel via datasette publish ─────────────────────────
      # Requires VERCEL_TOKEN secret set in repo Settings → Secrets.
      # Get your token at: https://vercel.com/account/tokens
      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Install datasette-publish-vercel
        run: pip install datasette-publish-vercel

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          datasette publish vercel eoir_decisions.db \
            --project=eoir-decisions \
            --metadata=metadata.yml \
            --token=$VERCEL_TOKEN \
            --install=datasette-vega \
            --setting default_page_size 50 \
            --setting max_returned_rows 2000 \
            --setting sql_time_limit_ms 5000
