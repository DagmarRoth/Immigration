name: Daily Scrape + Publish SQLite

# Runs every day at 8am ET (noon UTC)
# Also runs on every push to main (for testing), and can be triggered manually
on:
  schedule:
    - cron: '0 12 * * *'
  push:
    branches: [main]
    paths:
      - 'eoir_decisions_scraper.ipynb'
      - 'json_to_sqlite.py'
      - 'metadata.yml'
      - '.github/workflows/scrape.yml'
  workflow_dispatch:

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit updated data files back to the repo

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Python + dependencies ─────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt jupyter nbconvert

      # ── 3. Run scraper ────────────────────────────────────────────────────
      - name: Convert notebook to script
        run: |
          jupyter nbconvert --to script eoir_decisions_scraper.ipynb \
            --output eoir_decisions_scraper --output-dir .
          # nbconvert outputs .txt when notebook lacks kernel language metadata
          [ -f eoir_decisions_scraper.txt ] && mv eoir_decisions_scraper.txt eoir_decisions_scraper.py
          ls -la eoir_decisions_scraper.py

      - name: Run scraper
        run: python3 eoir_decisions_scraper.py

      # ── 4. Build SQLite database ──────────────────────────────────────────
      - name: Build SQLite database
        run: python3 json_to_sqlite.py

      # ── 5. Commit updated data back to the repo ───────────────────────────
      # Commits JSON + SQLite so the repo always has the latest data.
      # The SQLite file powers the datasette-lite public URL (no server needed).
      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bia_ag_decisions.json \
                  data/ocaho_decisions.json \
                  eoir_decisions.db
          git add data/changelogs/ data/error_logs/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No data changes today — skipping commit."
          else
            git commit -m "auto-scrape: $(date -u '+%Y-%m-%d')"
            git push
          fi

      # ── 6. Print public datasette-lite URL ───────────────────────────────
      - name: Print datasette-lite URL
        run: |
          echo "Public URL (no server required — runs in browser):"
          echo "https://lite.datasette.io/?url=https://raw.githubusercontent.com/DagmarRoth/Immigration/main/eoir_decisions.db"
